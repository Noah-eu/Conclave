[build]
  base = "."
  command = "npm ci && npm ci --prefix apps/web && npm run build --prefix apps/web"
  publish = "apps/web/dist"

[functions]
  directory = "netlify/functions"

# Netlify Functions (API) — keep frontend calling /api/*
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/preview/*"
  to = "/.netlify/functions/api/preview/:splat"
  status = 200
  force = true

